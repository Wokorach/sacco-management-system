<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cypis Sacco - Login Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-green-800 via-emerald-700 to-teal-800 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <div class="inline-block bg-green-100 rounded-full p-4 mb-4">
                <i class="fas fa-piggy-bank text-4xl text-green-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Cypis Sacco</h1>
            <p class="text-gray-500">Uganda Sacco Management System</p>
        </div>
        
        <div id="message" class="mb-4"></div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                <input type="email" id="email" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                       placeholder="Enter your email">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                <input type="password" id="password" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                       placeholder="Enter your password">
            </div>
            <button type="submit" id="loginBtn" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg transition duration-200">
                Login to Dashboard
            </button>
        </form>
        
        <div class="mt-6 pt-4 border-t">
            <p class="text-xs text-gray-500 text-center mb-2">Test Credentials:</p>
            <div class="grid grid-cols-1 gap-2 text-xs">
                <div class="bg-gray-50 p-2 rounded text-center">
                    <span class="font-bold text-green-600">Manager:</span> manager@cypissacco.com / admin123
                </div>
                <div class="bg-gray-50 p-2 rounded text-center">
                    <span class="font-bold text-blue-600">Assistant:</span> assistant@cypissacco.com / assistant123
                </div>
                <div class="bg-gray-50 p-2 rounded text-center">
                    <span class="font-bold text-purple-600">Loan Officer:</span> officer@cypissacco.com / officer123
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://manirdddkcvxcbvvusob.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1hbmlyZGRka2N2eGNidnZ1c29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTE0MTgsImV4cCI6MjA5MDI4NzQxOH0._rrnKSqeq51cH5AnN5KtEfTMBs3gcJIqIDwDNsDTvKA';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');
            
            messageDiv.innerHTML = '<div class="bg-blue-100 text-blue-700 p-3 rounded-lg"><i class="fas fa-spinner fa-spin mr-2"></i> Logging in...</div>';
            loginBtn.disabled = true;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    messageDiv.innerHTML = `<div class="bg-red-100 text-red-700 p-3 rounded-lg">❌ ${error.message}</div>`;
                    loginBtn.disabled = false;
                    return;
                }
                
                if (data && data.user) {
                    // Get user profile
                    const { data: profile, error: profileError } = await supabase
                        .from('profiles')
                        .select('role, full_name')
                        .eq('id', data.user.id)
                        .single();
                    
                    if (profileError) {
                        messageDiv.innerHTML = `<div class="bg-yellow-100 text-yellow-700 p-3 rounded-lg">⚠️ Logged in but profile not found</div>`;
                        loginBtn.disabled = false;
                        return;
                    }
                    
                    // Store user data
                    localStorage.setItem('user', JSON.stringify({
                        id: data.user.id,
                        email: data.user.email,
                        role: profile.role,
                        full_name: profile.full_name
                    }));
                    
                    messageDiv.innerHTML = `<div class="bg-green-100 text-green-700 p-3 rounded-lg">
                        ✅ Login successful!<br>
                        Welcome ${profile.full_name}<br>
                        Role: ${profile.role}<br>
                        Redirecting...
                    </div>`;
                    
                    // Redirect based on role
                    setTimeout(() => {
                        if (profile.role === 'branch_manager') {
                            window.location.href = 'manager/dashboard.html';
                        } else if (profile.role === 'account_assistant') {
                            window.location.href = 'assistant/transactions.html';
                        } else if (profile.role === 'loan_officer') {
                            window.location.href = 'loan_officer/loans.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1500);
                }
            } catch (err) {
                messageDiv.innerHTML = `<div class="bg-red-100 text-red-700 p-3 rounded-lg">❌ Connection error: ${err.message}</div>`;
                loginBtn.disabled = false;
            }
        });
        
        // Check if already logged in
        const savedUser = localStorage.getItem('user');
        if (savedUser) {
            const user = JSON.parse(savedUser);
            window.location.href = user.role === 'branch_manager' ? 'manager/dashboard.html' :
                                   user.role === 'account_assistant' ? 'assistant/transactions.html' :
                                   user.role === 'loan_officer' ? 'loan_officer/loans.html' : 'dashboard.html';
        }
    </script>
</body>
</html>
